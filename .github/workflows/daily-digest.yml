name: Daily RSS Digest

on:
  schedule:
    # Run at 08:13 Beijing time (00:13 UTC)
    - cron: '13 0 * * *'
  workflow_dispatch:
    inputs:
      recipient_mode:
        description: 'Choose which recipient list to use (test or production)'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - test

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r src/requirements.txt

      - name: Restore seen posts cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/rss-seen-posts.json
          key: rss-seen-posts-${{ github.repository }}-${{ github.workflow }}
          restore-keys: |
            rss-seen-posts-${{ github.repository }}-${{ github.workflow }}-
            rss-seen-posts-

      - name: Run RSS digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}
          RECIPIENT_EMAIL: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.recipient_mode == 'test') && secrets.TEST_RECIPIENT_EMAIL || secrets.RECIPIENT_EMAIL }}
          TOPIC_KEYWORDS: ${{ secrets.TOPIC_KEYWORDS }}
          ENABLE_TRANSLATION: ${{ secrets.ENABLE_TRANSLATION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISSING_DATE_FALLBACK_RATIO: ${{ secrets.MISSING_DATE_FALLBACK_RATIO }}
          MISSING_DATE_FALLBACK_LATEST_N: ${{ secrets.MISSING_DATE_FALLBACK_LATEST_N }}
          SEEN_POSTS_FILE: .cache/rss-seen-posts.json
          SEEN_POSTS_TTL_DAYS: 30
          DEDUPE_MODE: fallback_only
        run: python -m src.main

      - name: Save seen posts cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/rss-seen-posts.json
          key: rss-seen-posts-${{ github.repository }}-${{ github.workflow }}-${{ github.run_id }}
